name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Gradle
        run: |
          # Создаем базовую структуру, если ее нет
          mkdir -p app/src/main/java/com/example/myapp
          # В реальном проекте здесь будут твои файлы
          ./gradlew assembleDebug || echo "Сборка требует файлов проекта"
